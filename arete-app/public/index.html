<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="Arête — excellence, daily" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <title>Arête</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Inter', sans-serif; background: #fafaf8; overflow-x: hidden; }
      :root {
        --sage: #4a7c6b;
        --sage-light: #e8f5ef;
        --sage-dark: #2d4a3e;
        --coral: #e8875a;
        --coral-light: #fff0ec;
        --lavender: #9a6ac4;
        --lavender-light: #f5f0ff;
        --gold: #c4955a;
        --gold-light: #fff8e8;
        --blue: #5a7ad4;
        --blue-light: #f0f4ff;
        --cream: #fafaf8;
        --white: #ffffff;
        --text-dark: #1a1a1a;
        --text-mid: #5a5a5a;
        --text-muted: #9a9a9a;
        --border: rgba(0,0,0,0.07);
      }
      ::selection { background: var(--sage-light); }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
